name: Plugin CI/CD Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate plugin file structure & JSON
  # ─────────────────────────────────────────────
  validate:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "=== Checking required files ==="
          test -f SKILL.md                                       && echo "✓ SKILL.md"
          test -f install.sh                                     && echo "✓ install.sh"
          test -f README.md                                      && echo "✓ README.md"
          test -f QUICKSTART.md                                  && echo "✓ QUICKSTART.md"
          test -f INSTALLATION.md                                && echo "✓ INSTALLATION.md"
          test -f USAGE_EXAMPLES.md                              && echo "✓ USAGE_EXAMPLES.md"
          test -f CONTRIBUTING.md                                && echo "✓ CONTRIBUTING.md"
          test -f CHANGELOG.md                                   && echo "✓ CHANGELOG.md"
          test -f .gitignore                                     && echo "✓ .gitignore"
          test -f .claude-plugin/plugin.json                     && echo "✓ .claude-plugin/plugin.json"
          test -f .claude-plugin/marketplace.json                && echo "✓ .claude-plugin/marketplace.json"
          test -f .claude-plugin/README.md                       && echo "✓ .claude-plugin/README.md"
          test -f skills/linkedin-job-auto-apply/SKILL.md        && echo "✓ skills/linkedin-job-auto-apply/SKILL.md"
          test -f skills/linkedin-job-auto-apply/README.md       && echo "✓ skills/linkedin-job-auto-apply/README.md"
          test -f skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js && echo "✓ autoApplyLinkedInJobs.js"
          test -f skills/linkedin-job-auto-apply/applySingleJob.js        && echo "✓ applySingleJob.js"
          echo ""
          echo "✅ All required files present."

      - name: Validate JSON — plugin.json
        run: |
          echo "=== Validating .claude-plugin/plugin.json ==="
          jq . .claude-plugin/plugin.json
          echo "✅ plugin.json is valid JSON"

      - name: Validate JSON — marketplace.json
        run: |
          echo "=== Validating .claude-plugin/marketplace.json ==="
          jq . .claude-plugin/marketplace.json
          echo "✅ marketplace.json is valid JSON"

      - name: Validate JSON fields
        run: |
          echo "=== Checking required JSON fields ==="

          # plugin.json
          test "$(jq -r '.name' .claude-plugin/plugin.json)" = "linkedin-job-auto-apply" && echo "✓ plugin.json: name"
          test "$(jq -r '.version' .claude-plugin/plugin.json)" != "null" && echo "✓ plugin.json: version"
          test "$(jq -r '.skills' .claude-plugin/plugin.json)" = "./skills" && echo "✓ plugin.json: skills path"

          # marketplace.json
          test "$(jq -r '.plugins[0].name' .claude-plugin/marketplace.json)" = "linkedin-job-auto-apply" && echo "✓ marketplace.json: plugin name"
          test "$(jq -r '.plugins[0].category' .claude-plugin/marketplace.json)" = "productivity" && echo "✓ marketplace.json: category"

          echo ""
          echo "✅ All JSON fields valid"

  # ─────────────────────────────────────────────
  # Job 2: Validate JavaScript syntax
  # ─────────────────────────────────────────────
  validate-javascript:
    name: Validate JavaScript Syntax
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate autoApplyLinkedInJobs.js syntax
        run: |
          echo "=== Validating autoApplyLinkedInJobs.js ==="
          node --check skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js
          echo "✅ autoApplyLinkedInJobs.js syntax is valid"

      - name: Validate applySingleJob.js syntax
        run: |
          echo "=== Validating applySingleJob.js ==="
          node --check skills/linkedin-job-auto-apply/applySingleJob.js
          echo "✅ applySingleJob.js syntax is valid"

      - name: Check for common JavaScript issues
        run: |
          echo "=== Checking for common JavaScript issues ==="

          # Check for console.log (should be present for debugging)
          if grep -q "console.log" skills/linkedin-job-auto-apply/*.js; then
            echo "✓ Console logging present for debugging"
          fi

          # Check for async/await usage
          if grep -q "async function" skills/linkedin-job-auto-apply/*.js; then
            echo "✓ Async functions present"
          fi

          # Check for error handling
          if grep -q "try {" skills/linkedin-job-auto-apply/*.js; then
            echo "✓ Error handling (try-catch) present"
          fi

          # Check for Playwright page usage
          if grep -q "page\." skills/linkedin-job-auto-apply/*.js; then
            echo "✓ Playwright page automation present"
          fi

          echo ""
          echo "✅ JavaScript code structure looks good"

  # ─────────────────────────────────────────────
  # Job 3: Test installation script
  # ─────────────────────────────────────────────
  test-install:
    name: Test install.sh
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check install.sh is executable
        run: |
          echo "=== Checking install.sh permissions ==="
          test -x install.sh && echo "✓ install.sh is executable" || (chmod +x install.sh && echo "✓ Made install.sh executable")

      - name: Dry run install.sh (simulate)
        run: |
          echo "=== Dry run of install.sh ==="
          # Create mock environment
          mkdir -p ~/.claude/skills

          # Run install script
          bash -x install.sh || echo "Install script completed with code: $?"

          echo ""
          echo "=== Verifying installation ==="

      - name: Verify skill was installed
        run: |
          echo "=== Checking skill installation ==="
          if test -d ~/.claude/skills/linkedin-job-auto-apply; then
            echo "✓ Skill directory created"
            ls -la ~/.claude/skills/linkedin-job-auto-apply/

            # Check essential files
            test -f ~/.claude/skills/linkedin-job-auto-apply/SKILL.md && echo "✓ SKILL.md installed"
            test -f ~/.claude/skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js && echo "✓ autoApplyLinkedInJobs.js installed"
            test -f ~/.claude/skills/linkedin-job-auto-apply/applySingleJob.js && echo "✓ applySingleJob.js installed"

            echo ""
            echo "✅ Installation successful"
          else
            echo "❌ Installation directory not found"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Job 4: Simulate plugin workflow
  # ─────────────────────────────────────────────
  test-plugin-workflow:
    name: Test Plugin Command Workflow
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Simulate: /plugin marketplace add yennanliu/linkedin-skill
      - name: "Simulate: /plugin marketplace add yennanliu/linkedin-skill"
        run: |
          echo "=== /plugin marketplace add yennanliu/linkedin-skill ==="
          mkdir -p ~/.claude/marketplaces
          cp .claude-plugin/marketplace.json ~/.claude/marketplaces/yennanliu-linkedin-skill.json
          echo "Marketplace registered:"
          jq '.name, .version' ~/.claude/marketplaces/yennanliu-linkedin-skill.json
          echo "✓ Marketplace added"

      # Simulate: /plugin install linkedin-job-auto-apply
      - name: "Simulate: /plugin install linkedin-job-auto-apply"
        run: |
          echo "=== /plugin install linkedin-job-auto-apply ==="
          mkdir -p ~/.claude/skills/linkedin-job-auto-apply
          cp -r skills/linkedin-job-auto-apply/* ~/.claude/skills/linkedin-job-auto-apply/
          echo "✓ Plugin installed"

      # Simulate: /plugin list
      - name: "Simulate: /plugin list"
        run: |
          echo "=== /plugin list ==="
          echo "Installed plugins:"
          ls -1 ~/.claude/skills/
          echo "---"
          for d in ~/.claude/skills/*/; do
            name=$(basename "$d")
            echo "  - $name"
          done
          echo "✓ Plugin listed"

      # Verify: /linkedin-job-auto-apply
      - name: "Verify: /linkedin-job-auto-apply skill is accessible"
        run: |
          echo "=== /linkedin-job-auto-apply (skill file check) ==="
          SKILL_FILE="$HOME/.claude/skills/linkedin-job-auto-apply/SKILL.md"
          test -f "$SKILL_FILE" || (echo "❌ SKILL.md not found" && exit 1)
          echo "✓ SKILL.md is present and readable"
          echo ""
          echo "--- First 30 lines of SKILL.md ---"
          head -30 "$SKILL_FILE"
          echo "---"
          echo "✅ Skill verification passed"

  # ─────────────────────────────────────────────
  # Job 5: Dry run JavaScript automation
  # ─────────────────────────────────────────────
  dry-run-automation:
    name: Dry Run Automation Scripts
    runs-on: ubuntu-latest
    needs: [validate-javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright (for types)
        run: |
          echo "=== Installing Playwright for type checking ==="
          npm install -D playwright@latest
          echo "✓ Playwright installed"

      - name: Test JavaScript module exports
        run: |
          echo "=== Testing JavaScript module structure ==="

          # Test autoApplyLinkedInJobs.js can be loaded
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js', 'utf8');
            console.log('✓ autoApplyLinkedInJobs.js loaded successfully');
            console.log('  File size:', content.length, 'bytes');
            console.log('  Contains autoApplyLinkedInJobs function:', content.includes('async function autoApplyLinkedInJobs'));
          "

          # Test applySingleJob.js can be loaded
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('skills/linkedin-job-auto-apply/applySingleJob.js', 'utf8');
            console.log('✓ applySingleJob.js loaded successfully');
            console.log('  File size:', content.length, 'bytes');
            console.log('  Contains listJobs function:', content.includes('async function listJobs'));
            console.log('  Contains applySingleJob function:', content.includes('async function applySingleJob'));
          "

          echo ""
          echo "✅ JavaScript modules structure validated"

      - name: Verify key function signatures
        run: |
          echo "=== Verifying function signatures ==="

          # Check autoApplyLinkedInJobs function signature
          if grep -q "async function autoApplyLinkedInJobs(page, options = {})" skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js; then
            echo "✓ autoApplyLinkedInJobs signature correct"
          else
            echo "❌ autoApplyLinkedInJobs signature not found"
            exit 1
          fi

          # Check listJobs function signature
          if grep -q "async function listJobs(page)" skills/linkedin-job-auto-apply/applySingleJob.js; then
            echo "✓ listJobs signature correct"
          else
            echo "❌ listJobs signature not found"
            exit 1
          fi

          # Check applySingleJob function signature
          if grep -q "async function applySingleJob(page, jobIndex)" skills/linkedin-job-auto-apply/applySingleJob.js; then
            echo "✓ applySingleJob signature correct"
          else
            echo "❌ applySingleJob signature not found"
            exit 1
          fi

          echo ""
          echo "✅ All function signatures validated"

  # ─────────────────────────────────────────────
  # Job 6: Validate documentation
  # ─────────────────────────────────────────────
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check documentation completeness
        run: |
          echo "=== Checking documentation files ==="

          # Check file sizes (should not be empty)
          for file in README.md QUICKSTART.md INSTALLATION.md USAGE_EXAMPLES.md CONTRIBUTING.md CHANGELOG.md; do
            size=$(wc -c < "$file")
            if [ "$size" -gt 100 ]; then
              echo "✓ $file ($size bytes)"
            else
              echo "❌ $file is too small ($size bytes)"
              exit 1
            fi
          done

          echo ""
          echo "✅ All documentation files present and substantial"

      - name: Check for broken links (basic)
        run: |
          echo "=== Checking for obvious broken links ==="

          # Check for common broken link patterns
          if grep -r "](http" *.md | grep -v "https://github.com" | grep -v "https://linkedin.com" | grep -v "https://claude.ai"; then
            echo "⚠️  External links found (manual verification recommended)"
          fi

          echo "✓ Basic link check complete"

  # ─────────────────────────────────────────────
  # Job 7: Auto-update & deploy to Claude Marketplace
  # ─────────────────────────────────────────────
  deploy-marketplace:
    name: Auto-Update & Deploy to Claude Marketplace
    runs-on: ubuntu-latest
    needs: [test-install, test-plugin-workflow, dry-run-automation, validate-docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout (full history, push-capable token)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Guard: skip if this commit is already the version bump ──────────
      - name: Guard — skip version-bump commits
        id: guard
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $MSG"
          if echo "$MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Version-bump commit detected — skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Bump patch version (e.g. 1.0.0 → 1.0.1) ────────────────────────
      - name: Bump patch version
        id: bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          OLD=$(jq -r '.version' .claude-plugin/plugin.json)
          MAJOR=$(echo "$OLD" | cut -d. -f1)
          MINOR=$(echo "$OLD" | cut -d. -f2)
          PATCH=$(echo "$OLD" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          # Update plugin.json
          jq --arg v "$NEW" '.version = $v' \
            .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json

          # Update marketplace.json (top-level + plugins[0])
          jq --arg v "$NEW" '.version = $v | .plugins[0].version = $v' \
            .claude-plugin/marketplace.json > /tmp/marketplace.json
          mv /tmp/marketplace.json .claude-plugin/marketplace.json

          echo "old=$OLD"   >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "🔼 Bumped: $OLD → $NEW"

      # ── Commit & push version bump (tagged [skip ci]) ───────────────────
      - name: Commit & push version bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main
          echo "✓ Version bump pushed"

      # ── Create GitHub Release (= Claude Marketplace entry) ──────────────
      - name: Create GitHub Release
        if: steps.guard.outputs.skip == 'false'
        run: |
          # Point the release tag at the bump commit we just pushed
          git pull origin main
          TAG="v${{ steps.bump.outputs.version }}"
          TARGET=$(git rev-parse HEAD)

          gh release create "$TAG" \
            --title "$TAG" \
            --target "$TARGET" \
            --latest \
            --notes "## 🎉 What's new in $TAG

          ✅ Auto-released after all CI tests passed on \`main\`.

          ### 📦 Install / update via Claude Code
          \`\`\`bash
          claude
          /plugin marketplace add yennanliu/linkedin-skill
          /plugin install linkedin-job-auto-apply
          /linkedin-job-auto-apply
          \`\`\`

          ### ✨ Features
          - Easy Apply automation for LinkedIn
          - Target-based execution with keyboard controls (P/R/Q)
          - On-page status indicator
          - Smart job filtering (skip already applied)
          - Human-like delays (2-4 seconds)
          - Multi-step Easy Apply handling

          ### 📚 Documentation
          - [Quick Start Guide](https://github.com/yennanliu/linkedin-skill/blob/main/QUICKSTART.md)
          - [Full Documentation](https://github.com/yennanliu/linkedin-skill/blob/main/skills/linkedin-job-auto-apply/SKILL.md)
          - [Usage Examples](https://github.com/yennanliu/linkedin-skill/blob/main/USAGE_EXAMPLES.md)

          See [CHANGELOG](https://github.com/yennanliu/linkedin-skill/blob/main/CHANGELOG.md) for full release notes."

          echo ""
          echo "========================================="
          echo "🚀 Marketplace release published: $TAG"
          echo "========================================="
          echo "Users can install with:"
          echo "  /plugin marketplace add yennanliu/linkedin-skill"
          echo "  /plugin install linkedin-job-auto-apply"
          echo "========================================="
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update CHANGELOG.md
        if: steps.guard.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # Prepend new version entry to CHANGELOG.md
          cat > /tmp/changelog_entry.md << EOF
          ## [$VERSION] - $DATE

          ### Changed
          - Auto-release from CI/CD pipeline
          - All tests passed successfully

          EOF

          # Insert after the [Unreleased] section
          sed -i '/## \[Unreleased\]/r /tmp/changelog_entry.md' CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for v$VERSION [skip ci]"
          git push origin main

          echo "✓ CHANGELOG updated"
