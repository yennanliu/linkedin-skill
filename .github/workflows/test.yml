name: Plugin CI/CD Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate plugin file structure & JSON
  # ─────────────────────────────────────────────
  validate:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "=== Checking required files ==="
          test -f SKILL.md                                                    && echo "✓ SKILL.md"
          test -f install.sh                                                  && echo "✓ install.sh"
          test -f README.md                                                   && echo "✓ README.md"
          test -f QUICKSTART.md                                               && echo "✓ QUICKSTART.md"
          test -f INSTALLATION.md                                             && echo "✓ INSTALLATION.md"
          test -f USAGE_EXAMPLES.md                                           && echo "✓ USAGE_EXAMPLES.md"
          test -f CONTRIBUTING.md                                             && echo "✓ CONTRIBUTING.md"
          test -f CHANGELOG.md                                                && echo "✓ CHANGELOG.md"
          test -f .gitignore                                                  && echo "✓ .gitignore"
          test -f .claude-plugin/plugin.json                                  && echo "✓ .claude-plugin/plugin.json"
          test -f .claude-plugin/marketplace.json                             && echo "✓ .claude-plugin/marketplace.json"
          test -f .claude-plugin/README.md                                    && echo "✓ .claude-plugin/README.md"
          # job auto-apply skill
          test -f skills/linkedin-job-auto-apply/SKILL.md                    && echo "✓ linkedin-job-auto-apply/SKILL.md"
          test -f skills/linkedin-job-auto-apply/README.md                   && echo "✓ linkedin-job-auto-apply/README.md"
          test -f skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js    && echo "✓ autoApplyLinkedInJobs.js"
          test -f skills/linkedin-job-auto-apply/applySingleJob.js           && echo "✓ applySingleJob.js"
          # profile scraper skill
          test -f skills/linkedin-profile-scraper/SKILL.md                   && echo "✓ linkedin-profile-scraper/SKILL.md"
          test -f skills/linkedin-profile-scraper/scrapeLinkedInProfiles.js  && echo "✓ scrapeLinkedInProfiles.js"
          test -f skills/linkedin-profile-scraper/scrapeSingleProfile.js     && echo "✓ scrapeSingleProfile.js"
          # platform config files
          test -f GEMINI.md                                                   && echo "✓ GEMINI.md"
          test -f .gemini/extensions/linkedin-job-auto-apply/gemini-extension.json && echo "✓ gemini-extension.json"
          test -f .github/copilot-instructions.md                            && echo "✓ copilot-instructions.md"
          echo ""
          echo "✅ All required files present."

      - name: Validate JSON — plugin.json
        run: |
          echo "=== Validating .claude-plugin/plugin.json ==="
          jq . .claude-plugin/plugin.json
          echo "✅ plugin.json is valid JSON"

      - name: Validate JSON — marketplace.json
        run: |
          echo "=== Validating .claude-plugin/marketplace.json ==="
          jq . .claude-plugin/marketplace.json
          echo "✅ marketplace.json is valid JSON"

      - name: Validate JSON — gemini-extension.json
        run: |
          echo "=== Validating .gemini/extensions/linkedin-job-auto-apply/gemini-extension.json ==="
          jq . .gemini/extensions/linkedin-job-auto-apply/gemini-extension.json
          echo "✅ gemini-extension.json is valid JSON"

      - name: Validate JSON fields
        run: |
          echo "=== Checking required JSON fields ==="

          # plugin.json
          test "$(jq -r '.name' .claude-plugin/plugin.json)" = "linkedin-job-auto-apply" && echo "✓ plugin.json: name"
          test "$(jq -r '.version' .claude-plugin/plugin.json)" != "null"                && echo "✓ plugin.json: version"
          test "$(jq -r '.skills' .claude-plugin/plugin.json)" = "./skills"             && echo "✓ plugin.json: skills path"

          # marketplace.json
          test "$(jq -r '.plugins[0].name' .claude-plugin/marketplace.json)" = "linkedin-job-auto-apply" && echo "✓ marketplace.json: plugin name"
          test "$(jq -r '.plugins[0].category' .claude-plugin/marketplace.json)" = "productivity"        && echo "✓ marketplace.json: category"

          # gemini-extension.json
          test "$(jq -r '.name' .gemini/extensions/linkedin-job-auto-apply/gemini-extension.json)" = "linkedin-job-auto-apply" && echo "✓ gemini-extension.json: name"

          echo ""
          echo "✅ All JSON fields valid"

  # ─────────────────────────────────────────────
  # Job 2: Validate JavaScript syntax
  # ─────────────────────────────────────────────
  validate-javascript:
    name: Validate JavaScript Syntax
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate job auto-apply scripts
        run: |
          node --check skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js
          echo "✅ autoApplyLinkedInJobs.js syntax valid"
          node --check skills/linkedin-job-auto-apply/applySingleJob.js
          echo "✅ applySingleJob.js syntax valid"

      - name: Validate profile scraper scripts
        run: |
          node --check skills/linkedin-profile-scraper/scrapeLinkedInProfiles.js
          echo "✅ scrapeLinkedInProfiles.js syntax valid"
          node --check skills/linkedin-profile-scraper/scrapeSingleProfile.js
          echo "✅ scrapeSingleProfile.js syntax valid"

      - name: Check JavaScript code quality (all skills)
        run: |
          echo "=== Checking all skill JS files ==="
          for dir in skills/*/; do
            echo "--- $dir ---"
            for f in "$dir"*.js; do
              [ -f "$f" ] || continue
              grep -q "console.log"     "$f" && echo "  ✓ logging: $f"
              grep -q "async function"  "$f" && echo "  ✓ async:   $f"
              grep -q "try {"           "$f" && echo "  ✓ try-catch: $f"
              grep -q "page\."          "$f" && echo "  ✓ playwright: $f"
            done
          done
          echo ""
          echo "✅ JavaScript code structure looks good"

  # ─────────────────────────────────────────────
  # Job 3: Test installation script
  # ─────────────────────────────────────────────
  test-install:
    name: Test install.sh
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check install.sh is executable
        run: |
          test -x install.sh && echo "✓ install.sh is executable" || (chmod +x install.sh && echo "✓ Made install.sh executable")

      - name: Run install.sh with mock claude in PATH
        run: |
          echo "=== Setting up mock claude binary ==="
          mkdir -p "$HOME/mock-bin"
          echo '#!/bin/bash' > "$HOME/mock-bin/claude"
          chmod +x "$HOME/mock-bin/claude"
          export PATH="$HOME/mock-bin:$PATH"

          echo "=== Running install.sh ==="
          bash install.sh

      - name: Verify linkedin-job-auto-apply installed
        run: |
          DEST="$HOME/.claude/skills/linkedin-job-auto-apply"
          test -d "$DEST"                              || { echo "❌ directory missing"; exit 1; }
          test -f "$DEST/SKILL.md"                    && echo "✓ SKILL.md"
          test -f "$DEST/autoApplyLinkedInJobs.js"   && echo "✓ autoApplyLinkedInJobs.js"
          test -f "$DEST/applySingleJob.js"           && echo "✓ applySingleJob.js"
          echo "✅ linkedin-job-auto-apply installed"

      - name: Verify linkedin-profile-scraper installed
        run: |
          DEST="$HOME/.claude/skills/linkedin-profile-scraper"
          test -d "$DEST"                               || { echo "❌ directory missing"; exit 1; }
          test -f "$DEST/SKILL.md"                     && echo "✓ SKILL.md"
          test -f "$DEST/scrapeLinkedInProfiles.js"    && echo "✓ scrapeLinkedInProfiles.js"
          test -f "$DEST/scrapeSingleProfile.js"       && echo "✓ scrapeSingleProfile.js"
          echo "✅ linkedin-profile-scraper installed"

  # ─────────────────────────────────────────────
  # Job 4: Simulate plugin workflow
  # ─────────────────────────────────────────────
  test-plugin-workflow:
    name: Test Plugin Command Workflow
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Simulate: /plugin marketplace add yennanliu/linkedin-skill"
        run: |
          mkdir -p ~/.claude/marketplaces
          cp .claude-plugin/marketplace.json ~/.claude/marketplaces/yennanliu-linkedin-skill.json
          jq '.name, .version' ~/.claude/marketplaces/yennanliu-linkedin-skill.json
          echo "✓ Marketplace added"

      - name: "Simulate: /plugin install linkedin-job-auto-apply"
        run: |
          mkdir -p ~/.claude/skills/linkedin-job-auto-apply
          cp -r skills/linkedin-job-auto-apply/* ~/.claude/skills/linkedin-job-auto-apply/
          echo "✓ linkedin-job-auto-apply installed"

      - name: "Simulate: /plugin install linkedin-profile-scraper"
        run: |
          mkdir -p ~/.claude/skills/linkedin-profile-scraper
          cp -r skills/linkedin-profile-scraper/* ~/.claude/skills/linkedin-profile-scraper/
          echo "✓ linkedin-profile-scraper installed"

      - name: "Simulate: /plugin list"
        run: |
          echo "Installed skills:"
          for d in ~/.claude/skills/*/; do echo "  - $(basename $d)"; done
          echo "✓ Plugin list OK"

      - name: "Verify: skill files are accessible"
        run: |
          for skill in linkedin-job-auto-apply linkedin-profile-scraper; do
            f="$HOME/.claude/skills/$skill/SKILL.md"
            test -f "$f" || { echo "❌ $f missing"; exit 1; }
            echo "✓ $skill/SKILL.md present"
          done
          echo "✅ All skill files verified"

  # ─────────────────────────────────────────────
  # Job 5: Dry run JavaScript automation
  # ─────────────────────────────────────────────
  dry-run-automation:
    name: Dry Run Automation Scripts
    runs-on: ubuntu-latest
    needs: [validate-javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test JavaScript module structure
        run: |
          node -e "
            const fs = require('fs');
            const files = {
              'autoApplyLinkedInJobs.js':   ['async function autoApplyLinkedInJobs(page, options = {})'],
              'applySingleJob.js':           ['async function listJobs(page)', 'async function applySingleJob(page, jobIndex)'],
              'scrapeLinkedInProfiles.js':   ['async function scrapeLinkedInProfiles(page, options = {})'],
              'scrapeSingleProfile.js':      ['async function scrapeSingleProfile(page, profileUrl)'],
            };
            const dirs = {
              'autoApplyLinkedInJobs.js':  'skills/linkedin-job-auto-apply',
              'applySingleJob.js':         'skills/linkedin-job-auto-apply',
              'scrapeLinkedInProfiles.js': 'skills/linkedin-profile-scraper',
              'scrapeSingleProfile.js':    'skills/linkedin-profile-scraper',
            };
            let ok = true;
            for (const [file, sigs] of Object.entries(files)) {
              const path = dirs[file] + '/' + file;
              const src = fs.readFileSync(path, 'utf8');
              for (const sig of sigs) {
                if (!src.includes(sig)) {
                  console.error('❌ Missing signature in ' + file + ': ' + sig);
                  ok = false;
                } else {
                  console.log('✓ ' + file + ': ' + sig.split('(')[0].trim());
                }
              }
            }
            if (!ok) process.exit(1);
            console.log('');
            console.log('✅ All function signatures validated');
          "

  # ─────────────────────────────────────────────
  # Job 6: Validate documentation
  # ─────────────────────────────────────────────
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check documentation completeness
        run: |
          echo "=== Checking documentation files ==="
          for file in README.md QUICKSTART.md INSTALLATION.md USAGE_EXAMPLES.md CONTRIBUTING.md CHANGELOG.md \
                      GEMINI.md INSTALL_GEMINI.md INSTALL_COPILOT.md \
                      skills/linkedin-profile-scraper/SKILL.md; do
            size=$(wc -c < "$file")
            if [ "$size" -gt 100 ]; then
              echo "✓ $file ($size bytes)"
            else
              echo "❌ $file is too small ($size bytes)"
              exit 1
            fi
          done
          echo ""
          echo "✅ All documentation files present and substantial"

      - name: Check for broken links (basic)
        run: |
          if grep -r "](http" *.md | grep -v "https://github.com" | grep -v "https://linkedin.com" | grep -v "https://claude.ai"; then
            echo "⚠️  External links found (manual verification recommended)"
          fi
          echo "✓ Basic link check complete"

  # ─────────────────────────────────────────────
  # Job 7: Auto-update & deploy to Claude Marketplace
  # ─────────────────────────────────────────────
  deploy-marketplace:
    name: Auto-Update & Deploy to Claude Marketplace
    runs-on: ubuntu-latest
    needs: [test-install, test-plugin-workflow, dry-run-automation, validate-docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout (full history, push-capable token)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Guard — skip version-bump commits
        id: guard
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $MSG"
          if echo "$MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Version-bump commit detected — skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        id: bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          OLD=$(jq -r '.version' .claude-plugin/plugin.json)
          MAJOR=$(echo "$OLD" | cut -d. -f1)
          MINOR=$(echo "$OLD" | cut -d. -f2)
          PATCH=$(echo "$OLD" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          jq --arg v "$NEW" '.version = $v' \
            .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json

          jq --arg v "$NEW" '.version = $v | .plugins[0].version = $v' \
            .claude-plugin/marketplace.json > /tmp/marketplace.json
          mv /tmp/marketplace.json .claude-plugin/marketplace.json

          echo "old=$OLD"      >> "$GITHUB_OUTPUT"
          echo "version=$NEW"  >> "$GITHUB_OUTPUT"
          echo "🔼 Bumped: $OLD → $NEW"

      - name: Commit & push version bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main
          echo "✓ Version bump pushed"

      - name: Create GitHub Release
        if: steps.guard.outputs.skip == 'false'
        run: |
          git pull origin main
          TAG="v${{ steps.bump.outputs.version }}"
          TARGET=$(git rev-parse HEAD)

          gh release create "$TAG" \
            --title "$TAG" \
            --target "$TARGET" \
            --latest \
            --notes "## What's new in $TAG

          Auto-released after all CI tests passed on \`main\`.

          ### Skills included
          - **linkedin-job-auto-apply** — Easy Apply automation with keyboard controls (P/R/Q)
          - **linkedin-profile-scraper** — Scrape profiles by company / country / industry

          ### Install via Claude Code
          \`\`\`bash
          /plugin marketplace add yennanliu/linkedin-skill
          /plugin install linkedin-job-auto-apply
          /plugin install linkedin-profile-scraper
          \`\`\`

          ### Install via script (Claude + Gemini auto-detected)
          \`\`\`bash
          ./install.sh
          \`\`\`

          See [CHANGELOG](https://github.com/yennanliu/linkedin-skill/blob/main/CHANGELOG.md) for full release notes."

          echo "🚀 Release published: $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update CHANGELOG.md
        if: steps.guard.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          cat > /tmp/changelog_entry.md << EOF
          ## [$VERSION] - $DATE

          ### Changed
          - Auto-release from CI/CD pipeline
          - All tests passed successfully

          EOF

          sed -i '/## \[Unreleased\]/r /tmp/changelog_entry.md' CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for v$VERSION [skip ci]"
          git push origin main
          echo "✓ CHANGELOG updated"
