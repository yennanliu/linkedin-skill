name: Plugin CI/CD Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Validate plugin file structure & JSON
  # ─────────────────────────────────────────────
  validate:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "=== Checking required files ==="
          # root
          test -f SKILL.md                                                    && echo "✓ SKILL.md"
          test -f install.sh                                                  && echo "✓ install.sh"
          test -f README.md                                                   && echo "✓ README.md"
          test -f QUICKSTART.md                                               && echo "✓ QUICKSTART.md"
          test -f INSTALLATION.md                                             && echo "✓ INSTALLATION.md"
          test -f USAGE_EXAMPLES.md                                           && echo "✓ USAGE_EXAMPLES.md"
          test -f CONTRIBUTING.md                                             && echo "✓ CONTRIBUTING.md"
          test -f CHANGELOG.md                                                && echo "✓ CHANGELOG.md"
          test -f .gitignore                                                  && echo "✓ .gitignore"
          # plugin manifests
          test -f .claude-plugin/plugin.json                                  && echo "✓ .claude-plugin/plugin.json"
          test -f .claude-plugin/marketplace.json                             && echo "✓ .claude-plugin/marketplace.json"
          test -f .claude-plugin/README.md                                    && echo "✓ .claude-plugin/README.md"
          # job auto-apply skill
          test -f skills/linkedin-job-auto-apply/SKILL.md                    && echo "✓ linkedin-job-auto-apply/SKILL.md"
          test -f skills/linkedin-job-auto-apply/README.md                   && echo "✓ linkedin-job-auto-apply/README.md"
          test -f skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js    && echo "✓ autoApplyLinkedInJobs.js"
          test -f skills/linkedin-job-auto-apply/applySingleJob.js           && echo "✓ applySingleJob.js"
          # profile scraper skill
          test -f skills/linkedin-profile-scraper/SKILL.md                   && echo "✓ linkedin-profile-scraper/SKILL.md"
          test -f skills/linkedin-profile-scraper/scrapeLinkedInProfiles.js  && echo "✓ scrapeLinkedInProfiles.js"
          test -f skills/linkedin-profile-scraper/scrapeSingleProfile.js     && echo "✓ scrapeSingleProfile.js"
          # tests
          test -f tests/profileScraper.unit.test.js                          && echo "✓ tests/profileScraper.unit.test.js"
          # platform configs
          test -f GEMINI.md                                                   && echo "✓ GEMINI.md"
          test -f .gemini/extensions/linkedin-job-auto-apply/gemini-extension.json && echo "✓ gemini-extension.json"
          test -f .github/copilot-instructions.md                            && echo "✓ copilot-instructions.md"
          echo ""
          echo "✅ All required files present."

      - name: Validate JSON files
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json \
                   .gemini/extensions/linkedin-job-auto-apply/gemini-extension.json; do
            jq . "$f" > /dev/null && echo "✓ valid JSON: $f"
          done

      - name: Validate JSON fields
        run: |
          test "$(jq -r '.name'            .claude-plugin/plugin.json)"          = "linkedin-job-auto-apply" && echo "✓ plugin.json: name"
          test "$(jq -r '.version'         .claude-plugin/plugin.json)"          != "null"                   && echo "✓ plugin.json: version"
          test "$(jq -r '.skills'          .claude-plugin/plugin.json)"          = "./skills"                && echo "✓ plugin.json: skills path"
          test "$(jq -r '.plugins[0].name' .claude-plugin/marketplace.json)"     = "linkedin-job-auto-apply" && echo "✓ marketplace.json: name"
          test "$(jq -r '.plugins[0].category' .claude-plugin/marketplace.json)" = "productivity"            && echo "✓ marketplace.json: category"
          test "$(jq -r '.name' .gemini/extensions/linkedin-job-auto-apply/gemini-extension.json)" = "linkedin-job-auto-apply" && echo "✓ gemini-extension.json: name"
          echo "✅ All JSON fields valid"

  # ─────────────────────────────────────────────
  # Job 2: Validate JavaScript syntax
  # ─────────────────────────────────────────────
  validate-javascript:
    name: Validate JavaScript Syntax
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check all skill JS files
        run: |
          for f in skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js \
                   skills/linkedin-job-auto-apply/applySingleJob.js \
                   skills/linkedin-profile-scraper/scrapeLinkedInProfiles.js \
                   skills/linkedin-profile-scraper/scrapeSingleProfile.js; do
            node --check "$f" && echo "✓ syntax OK: $f"
          done

      - name: Code quality checks (all skills)
        run: |
          for dir in skills/*/; do
            for f in "$dir"*.js; do
              [ -f "$f" ] || continue
              grep -q "console.log"    "$f" && echo "✓ logging:    $f"
              grep -q "async function" "$f" && echo "✓ async:      $f"
              grep -q "try {"          "$f" && echo "✓ error-handling: $f"
              grep -q "page\."         "$f" && echo "✓ playwright: $f"
            done
          done
          echo "✅ Code quality checks passed"

  # ─────────────────────────────────────────────
  # Job 3: Unit tests — Profile Scraper
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests — Profile Scraper
    runs-on: ubuntu-latest
    needs: validate-javascript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node --test tests/profileScraper.unit.test.js

      - name: Verify test coverage (function signatures)
        run: |
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('tests/profileScraper.unit.test.js', 'utf8');
            const required = [
              'scrapeSingleProfile',
              'scrapeLinkedInProfiles',
              'status.*success',
              'status.*error',
              'workHistory',
            ];
            required.forEach(pattern => {
              if (!new RegExp(pattern).test(src)) {
                console.error('Missing test coverage for: ' + pattern);
                process.exit(1);
              }
              console.log('✓ covered: ' + pattern);
            });
            console.log('✅ Coverage check passed');
          "

  # ─────────────────────────────────────────────
  # Job 4: Full-flow tests — Profile Scraper (mock browser)
  # ─────────────────────────────────────────────
  full-flow-tests:
    name: Full-Flow Tests — Profile Scraper
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run full-flow simulation (end-to-end with mock page)
        run: |
          node - <<'EOF'
          const fs = require('fs');

          // Load source
          const stripExports = s => s.replace(/if \(typeof module[\s\S]+$/, '');
          eval(stripExports(fs.readFileSync('skills/linkedin-profile-scraper/scrapeLinkedInProfiles.js','utf8')));
          eval(stripExports(fs.readFileSync('skills/linkedin-profile-scraper/scrapeSingleProfile.js','utf8')));

          // Full mock of a LinkedIn search + profile visit flow
          function makeFullFlowPage(profileCount) {
            const urls = Array.from({ length: profileCount }, (_, i) =>
              `https://www.linkedin.com/in/person${i}/`
            );
            return {
              goto: async () => {},
              waitForTimeout: async () => {},
              evaluate: async (fn) => {
                const src = fn.toString();
                if (src.includes('linkedin.com/in/'))  return urls;
                if (src.includes('scrollTo'))           return undefined;
                if (src.includes('#experience')) return {
                  name: 'Test User',
                  headline: 'Engineer at Corp',
                  location: 'United States',
                  currentCompany: 'Corp',
                  currentTitle: 'Engineer',
                  industry: 'Technology',
                  workHistory: [
                    { title: 'Engineer', company: 'Corp', dateRange: '2020 – Present', location: 'US' },
                    { title: 'Junior',   company: 'Old Co', dateRange: '2018 – 2020',  location: 'UK' }
                  ],
                  profileUrl: 'https://www.linkedin.com/in/testuser/'
                };
                return null;
              }
            };
          }

          async function run() {
            console.log('\n=== Full-flow test: batch scrape ===');
            const page = makeFullFlowPage(5);
            const results = await scrapeLinkedInProfiles(page, {
              company: 'Corp',
              country: 'United States',
              industry: 'Technology',
              maxProfiles: 3,
              maxPages: 1
            });

            console.assert(Array.isArray(results),        'results is array');
            console.assert(results.length === 3,          'respects maxProfiles=3, got: ' + results.length);
            console.assert(results.every(r => r.status === 'success'), 'all success');
            console.assert(results[0].name === 'Test User', 'name extracted');
            console.assert(Array.isArray(results[0].workHistory), 'workHistory is array');
            console.assert(results[0].workHistory.length === 2, 'workHistory has 2 entries');
            console.assert(results[0].currentCompany === 'Corp', 'currentCompany extracted');
            console.log('✅ Batch scrape: all assertions passed');

            console.log('\n=== Full-flow test: single profile ===');
            const p2 = makeFullFlowPage(0);
            const profile = await scrapeSingleProfile(p2, 'https://www.linkedin.com/in/testuser/');
            console.assert(profile.status === 'success',              'status=success');
            console.assert(profile.name === 'Test User',              'name correct');
            console.assert(profile.location === 'United States',      'location correct');
            console.assert(profile.industry === 'Technology',         'industry correct');
            console.assert(profile.workHistory[1].company === 'Old Co', 'history[1] correct');
            console.log('✅ Single profile: all assertions passed');

            console.log('\n=== Full-flow test: error recovery ===');
            let callCount = 0;
            const errorPage = {
              goto: async () => {},
              waitForTimeout: async () => {},
              evaluate: async (fn) => {
                const src = fn.toString();
                if (src.includes('linkedin.com/in/'))
                  return ['https://www.linkedin.com/in/broken/'];
                if (src.includes('scrollTo')) return undefined;
                callCount++;
                throw new Error('simulated DOM error');
              }
            };
            const errResults = await scrapeLinkedInProfiles(errorPage, { maxPages: 1, maxProfiles: 1 });
            console.assert(errResults.length === 1,         'one result even on error');
            console.assert(errResults[0].status === 'error', 'status=error on DOM failure');
            console.log('✅ Error recovery: all assertions passed');

            console.log('\n✅ All full-flow tests passed\n');
          }

          run().catch(e => { console.error('FAILED:', e); process.exit(1); });
          EOF

  # ─────────────────────────────────────────────
  # Job 5: Test installation script
  # ─────────────────────────────────────────────
  test-install:
    name: Test install.sh
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Check install.sh is executable
        run: |
          test -x install.sh && echo "✓ executable" || (chmod +x install.sh && echo "✓ made executable")

      - name: Run install.sh with mock claude in PATH
        run: |
          # Create minimal mock node (needed for playwright mcp check) and claude
          mkdir -p "$HOME/mock-bin"
          printf '#!/bin/bash\necho "v20.0.0"' > "$HOME/mock-bin/node"
          printf '#!/bin/bash\necho "mock-claude"' > "$HOME/mock-bin/claude"
          chmod +x "$HOME/mock-bin/node" "$HOME/mock-bin/claude"

          # Mock npm/npx so playwright install doesn't run
          printf '#!/bin/bash\nexit 0' > "$HOME/mock-bin/npm"
          printf '#!/bin/bash\nexit 0' > "$HOME/mock-bin/npx"
          chmod +x "$HOME/mock-bin/npm" "$HOME/mock-bin/npx"

          export PATH="$HOME/mock-bin:$PATH"
          bash install.sh

      - name: Verify linkedin-job-auto-apply installed
        run: |
          DEST="$HOME/.claude/skills/linkedin-job-auto-apply"
          test -d "$DEST"                            || { echo "❌ dir missing"; exit 1; }
          test -f "$DEST/SKILL.md"                  && echo "✓ SKILL.md"
          test -f "$DEST/autoApplyLinkedInJobs.js"  && echo "✓ autoApplyLinkedInJobs.js"
          test -f "$DEST/applySingleJob.js"         && echo "✓ applySingleJob.js"
          echo "✅ linkedin-job-auto-apply installed"

      - name: Verify linkedin-profile-scraper installed
        run: |
          DEST="$HOME/.claude/skills/linkedin-profile-scraper"
          test -d "$DEST"                              || { echo "❌ dir missing"; exit 1; }
          test -f "$DEST/SKILL.md"                    && echo "✓ SKILL.md"
          test -f "$DEST/scrapeLinkedInProfiles.js"   && echo "✓ scrapeLinkedInProfiles.js"
          test -f "$DEST/scrapeSingleProfile.js"      && echo "✓ scrapeSingleProfile.js"
          echo "✅ linkedin-profile-scraper installed"

  # ─────────────────────────────────────────────
  # Job 6: Simulate plugin workflow
  # ─────────────────────────────────────────────
  test-plugin-workflow:
    name: Test Plugin Command Workflow
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Simulate marketplace add
        run: |
          mkdir -p ~/.claude/marketplaces
          cp .claude-plugin/marketplace.json ~/.claude/marketplaces/yennanliu-linkedin-skill.json
          jq '.name, .version' ~/.claude/marketplaces/yennanliu-linkedin-skill.json
          echo "✓ Marketplace added"

      - name: Simulate plugin install (both skills)
        run: |
          for skill in linkedin-job-auto-apply linkedin-profile-scraper; do
            mkdir -p ~/.claude/skills/$skill
            cp -r skills/$skill/* ~/.claude/skills/$skill/
            echo "✓ installed: $skill"
          done

      - name: Verify skill SKILL.md files accessible
        run: |
          for skill in linkedin-job-auto-apply linkedin-profile-scraper; do
            f="$HOME/.claude/skills/$skill/SKILL.md"
            test -f "$f" || { echo "❌ $f missing"; exit 1; }
            echo "✓ $skill/SKILL.md present"
          done
          echo "✅ All skill files verified"

  # ─────────────────────────────────────────────
  # Job 7: Dry run — verify function signatures
  # ─────────────────────────────────────────────
  dry-run-automation:
    name: Dry Run — Function Signatures
    runs-on: ubuntu-latest
    needs: [validate-javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify all function signatures
        run: |
          node -e "
            const fs = require('fs');
            const checks = [
              ['skills/linkedin-job-auto-apply/autoApplyLinkedInJobs.js', 'async function autoApplyLinkedInJobs(page, options = {})'],
              ['skills/linkedin-job-auto-apply/applySingleJob.js',        'async function listJobs(page)'],
              ['skills/linkedin-job-auto-apply/applySingleJob.js',        'async function applySingleJob(page, jobIndex, userProfile = {})'],
              ['skills/linkedin-profile-scraper/scrapeLinkedInProfiles.js','async function scrapeLinkedInProfiles(page, options = {})'],
              ['skills/linkedin-profile-scraper/scrapeSingleProfile.js',  'async function scrapeSingleProfile(page, profileUrl)'],
            ];
            let ok = true;
            checks.forEach(([file, sig]) => {
              const src = fs.readFileSync(file, 'utf8');
              if (!src.includes(sig)) {
                console.error('❌ Missing: ' + sig + ' in ' + file);
                ok = false;
              } else {
                console.log('✓ ' + sig.split('(')[0].replace('async function ', '') + ' — ' + file.split('/').pop());
              }
            });
            if (!ok) process.exit(1);
            console.log('');
            console.log('✅ All function signatures validated');
          "

  # ─────────────────────────────────────────────
  # Job 8: Validate documentation
  # ─────────────────────────────────────────────
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation files are non-empty
        run: |
          for file in README.md QUICKSTART.md INSTALLATION.md USAGE_EXAMPLES.md \
                      CONTRIBUTING.md CHANGELOG.md GEMINI.md INSTALL_GEMINI.md \
                      INSTALL_COPILOT.md skills/linkedin-profile-scraper/SKILL.md; do
            size=$(wc -c < "$file")
            [ "$size" -gt 100 ] && echo "✓ $file ($size bytes)" || { echo "❌ $file too small"; exit 1; }
          done
          echo "✅ All documentation files present and substantial"

      - name: Check for unexpected external links
        run: |
          if grep -r "](http" *.md | grep -v "https://github.com" | grep -v "https://linkedin.com" | grep -v "https://claude.ai" | grep -v "https://nodejs.org"; then
            echo "⚠️  Unrecognised external links found — verify manually"
          fi
          echo "✓ Link check complete"

  # ─────────────────────────────────────────────
  # Job 9: Auto-update & deploy to Claude Marketplace
  # ─────────────────────────────────────────────
  deploy-marketplace:
    name: Auto-Update & Deploy to Claude Marketplace
    runs-on: ubuntu-latest
    needs: [unit-tests, full-flow-tests, test-install, test-plugin-workflow, dry-run-automation, validate-docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Guard — skip version-bump commits
        id: guard
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $MSG"
          if echo "$MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  Version-bump commit — skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        id: bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          OLD=$(jq -r '.version' .claude-plugin/plugin.json)
          IFS='.' read -r MA MI PA <<< "$OLD"
          NEW="$MA.$MI.$((PA + 1))"
          jq --arg v "$NEW" '.version = $v' .claude-plugin/plugin.json > /tmp/p.json && mv /tmp/p.json .claude-plugin/plugin.json
          jq --arg v "$NEW" '.version = $v | .plugins[0].version = $v' .claude-plugin/marketplace.json > /tmp/m.json && mv /tmp/m.json .claude-plugin/marketplace.json
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "🔼 $OLD → $NEW"

      - name: Commit & push version bump
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main
          echo "✓ Version bump pushed"

      - name: Create GitHub Release
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git pull origin main
          TAG="v${{ steps.bump.outputs.version }}"

          gh release create "$TAG" \
            --title "$TAG" \
            --target "$(git rev-parse HEAD)" \
            --latest \
            --notes "## What's new in $TAG

          Auto-released after all CI tests passed on \`main\`.

          ### Skills
          - **linkedin-job-auto-apply** — Easy Apply automation with keyboard controls (P/R/Q)
          - **linkedin-profile-scraper** — Scrape profiles by company / country / industry

          ### Install
          \`\`\`bash
          # Claude Code
          /plugin marketplace add yennanliu/linkedin-skill
          /plugin install linkedin-job-auto-apply
          /plugin install linkedin-profile-scraper

          # All platforms (auto-detects claude + gemini, installs Playwright MCP)
          ./install.sh
          \`\`\`

          See [CHANGELOG](https://github.com/yennanliu/linkedin-skill/blob/main/CHANGELOG.md) for full notes."

          echo "🚀 Release published: $TAG"

      - name: Update CHANGELOG.md
        if: steps.guard.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          cat > /tmp/entry.md << EOF
          ## [$VERSION] - $DATE

          ### Changed
          - Auto-release from CI/CD pipeline
          - All tests passed (unit + full-flow + install)

          EOF
          sed -i '/## \[Unreleased\]/r /tmp/entry.md' CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for v$VERSION [skip ci]"
          git push origin main
          echo "✓ CHANGELOG updated"
